<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术支持 - 你的 App 名称</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f5f5f7; color: #1d1d1f; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { max-width: 500px; width: 90%; background: #ffffff; padding: 40px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); text-align: center; }
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 10px; }
        p { font-size: 15px; color: #86868b; line-height: 1.6; margin-bottom: 30px; }
        .contact-card { background: #f5f5f7; padding: 20px; border-radius: 12px; text-align: left; margin-bottom: 25px; }
        .contact-item { margin: 12px 0; font-size: 15px; }
        .label { font-weight: 600; color: #1d1d1f; display: inline-block; width: 80px; }
        .value { color: #0066cc; }
        .back-link { display: inline-block; color: #0066cc; text-decoration: none; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>技术支持与用户反馈</h1>
    <p>如果您在使用过程中遇到任何 Bug、闪退或功能建议，欢迎随时通过以下方式与我们沟通。</p>
    
    <div class="contact-card">
        <div class="contact-item"><span class="label">客服邮箱</span><span class="value">your-email@example.com</span></div>
        <div class="contact-item"><span class="label">微信客服</span><span class="value">your_wechat_id</span></div>
    </div>

    <p style="font-size: 13px;">我们会在收到消息后的 24 小时内给您回复，感谢您的支持！</p>
    
    <a href="index.html" class="back-link">← 返回主页</a>
</div>

</body>
</html>
