        .btn { display: block; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 500; text-decoration: none; transition: all 0.2s; }

        .btn-primary:hover { background-color: #0077ed; }
        .btn-secondary { background-color: #f5f5f7; color: #0066cc; }
